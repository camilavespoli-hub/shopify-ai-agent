name: Shopify AI Agent - Daily Run

on:
  schedule:
    - cron: '0 14 * * *'   # 9:00 AM EST todos los días
  workflow_dispatch:         # Permite correrlo manualmente desde GitHub

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > service_account.json

      - name: Run orchestrator
        env:
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          SHOPIFY_STORE_URL:      ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_ACCESS_TOKEN:   ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
        run: python3 orchestrator.py
